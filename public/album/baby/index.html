    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Album ảnh Bé — BEO STUDIO. Trọn bộ khoảnh khắc đầu đời của con." />
    <title>Album Bé · BEO STUDIO</title>
    <meta property="og:title" content="Album Bé · BEO STUDIO" />
    <meta property="og:description" content="Trọn bộ ảnh của bé — bấm để xem từng khoảnh khắc." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Áp dụng theme đã lưu trước khi render để tránh nháy màu
      (function () {
        try {
          var saved = localStorage.getItem('beo-theme');
          if (saved === 'dark' || saved === 'light') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --milk: #faf6f0;
        --cream: #f0e6d8;
        --rose: #e8c4bc;
        --rose-deep: #d9a89c;
        --clay: #c4826b;
        --ink: #3b2f2c;
        --ink-soft: #6f5f58;
        --surface: #ffffff;
        --contrast-bg: #3b2f2c;
        --contrast-text: #faf6f0;
        --border: color-mix(in srgb, var(--ink) 8%, transparent);
        --font-display: "Playfair Display", "Times New Roman", serif;
        --font-body: "Be Vietnam Pro", system-ui, sans-serif;
        --container: 1220px;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        color-scheme: light;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --milk: #1b1512;
          --cream: #241d17;
          --rose: #d9a89c;
          --rose-deep: #e8c4bc;
          --clay: #dc9c81;
          --ink: #f2e9e0;
          --ink-soft: #bca99d;
          --surface: #262019;
          --contrast-bg: #100c0a;
          --contrast-text: #f2e9e0;
          --border: color-mix(in srgb, var(--ink) 12%, transparent);
          color-scheme: dark;
        }
      }
      :root[data-theme="dark"] {
        --milk: #1b1512;
        --cream: #241d17;
        --rose: #d9a89c;
        --rose-deep: #e8c4bc;
        --clay: #dc9c81;
        --ink: #f2e9e0;
        --ink-soft: #bca99d;
        --surface: #262019;
        --contrast-bg: #100c0a;
        --contrast-text: #f2e9e0;
        --border: color-mix(in srgb, var(--ink) 12%, transparent);
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--milk);
        color: var(--ink);
        font-family: var(--font-body);
        font-weight: 300;
        -webkit-font-smoothing: antialiased;
        line-height: 1.6;
      }
      a { color: inherit; }
      .container { width: 100%; max-width: var(--container); margin-inline: auto; padding-inline: clamp(18px, 5vw, 40px); }

      /* ---------- Header ---------- */
      .site-header {
        position: sticky; top: 0; z-index: 20;
        background: color-mix(in srgb, var(--milk) 88%, transparent);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
      .nav { display: flex; align-items: center; justify-content: space-between; height: 68px; }
      .brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; font-family: var(--font-display); font-size: 1.25rem; letter-spacing: .01em; color: var(--ink); }
      .brand em { font-style: normal; color: var(--clay); }
      .brand-mark { width: 30px; height: 30px; color: var(--clay); }
      .nav-right { display: flex; align-items: center; gap: 8px; }
      .ghost-link {
        display: inline-flex; align-items: center; gap: 7px;
        text-decoration: none; font-size: .9rem; color: var(--ink-soft);
        padding: 9px 14px; border-radius: 999px; transition: color .2s var(--ease), background .2s var(--ease);
      }
      .ghost-link:hover { color: var(--ink); background: color-mix(in srgb, var(--ink) 6%, transparent); }
      .ghost-link svg { width: 16px; height: 16px; }
      .theme-toggle {
        display: inline-grid; place-items: center; width: 40px; height: 40px;
        border: 1px solid var(--border); border-radius: 999px; background: transparent;
        color: var(--ink); cursor: pointer; transition: background .2s var(--ease), border-color .2s var(--ease);
      }
      .theme-toggle:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); }
      .theme-toggle svg { width: 19px; height: 19px; }
      .icon-moon { display: none; }
      :root[data-theme="dark"] .icon-sun,
      html:not([data-theme="light"]) .icon-sun { display: none; }
      :root[data-theme="dark"] .icon-moon,
      html:not([data-theme="light"]) .icon-moon { display: block; }
      @media (prefers-color-scheme: light) {
        html:not([data-theme="dark"]) .icon-sun { display: block; }
        html:not([data-theme="dark"]) .icon-moon { display: none; }
      }

      /* ---------- Page head ---------- */
      .album-head { text-align: center; padding: clamp(40px, 7vw, 76px) 0 clamp(26px, 4vw, 40px); }
      .eyebrow { text-transform: uppercase; letter-spacing: .22em; font-size: .72rem; color: var(--clay); margin: 0 0 14px; font-weight: 500; }
      .album-head h1 { font-family: var(--font-display); font-weight: 500; font-size: clamp(2.1rem, 5.5vw, 3.4rem); line-height: 1.08; margin: 0 0 14px; }
      .album-head p { color: var(--ink-soft); max-width: 46ch; margin: 0 auto; font-size: 1.02rem; }
      .head-rule { width: 54px; height: 2px; background: var(--rose-deep); border: 0; border-radius: 2px; margin: 26px auto 0; }

      /* ---------- Masonry ---------- */
      .gallery-wrap { padding-bottom: clamp(60px, 9vw, 110px); }
      .masonry { column-count: 4; column-gap: 18px; }
      @media (max-width: 1080px) { .masonry { column-count: 3; } }
      @media (max-width: 720px) { .masonry { column-count: 2; column-gap: 12px; } }
      figure.tile {
        break-inside: avoid; margin: 0 0 18px; position: relative;
        border-radius: 16px; overflow: hidden; background: var(--cream);
        cursor: zoom-in; box-shadow: 0 1px 2px color-mix(in srgb, var(--ink) 8%, transparent);
        transition: transform .35s var(--ease), box-shadow .35s var(--ease);
        opacity: 0; animation: rise .5s var(--ease) forwards;
      }
      @media (max-width: 720px) { figure.tile { margin-bottom: 12px; } }
      figure.tile:hover { transform: translateY(-3px); box-shadow: 0 14px 30px -12px color-mix(in srgb, var(--ink) 40%, transparent); }
      figure.tile img { width: 100%; height: auto; display: block; transition: transform .5s var(--ease); }
      figure.tile:hover img { transform: scale(1.035); }
      figure.tile::after {
        content: ""; position: absolute; inset: 0;
        background: linear-gradient(to top, color-mix(in srgb, var(--ink) 26%, transparent), transparent 42%);
        opacity: 0; transition: opacity .35s var(--ease); pointer-events: none;
      }
      figure.tile:hover::after { opacity: 1; }
      @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

      /* ---------- States ---------- */
      .state { text-align: center; padding: 70px 0; color: var(--ink-soft); }
      .spinner { width: 34px; height: 34px; margin: 0 auto 18px; border: 3px solid var(--border); border-top-color: var(--clay); border-radius: 50%; animation: spin .8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .state.empty svg { width: 46px; height: 46px; color: var(--rose-deep); margin-bottom: 16px; }
      .state.empty h2 { font-family: var(--font-display); font-weight: 500; color: var(--ink); font-size: 1.4rem; margin: 0 0 8px; }

      /* ---------- Lightbox ---------- */
      .lightbox {
        position: fixed; inset: 0; z-index: 60; display: none;
        background: color-mix(in srgb, #100c0a 92%, transparent);
        backdrop-filter: blur(6px);
        align-items: center; justify-content: center;
      }
      .lightbox.open { display: flex; }
      body.lb-lock { overflow: hidden; }
      .lb-stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: clamp(14px, 4vw, 48px); }
      .lb-img { max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 30px 80px -20px rgba(0,0,0,.7); user-select: none; -webkit-user-drag: none; }
      .lb-btn {
        position: absolute; display: grid; place-items: center;
        width: 52px; height: 52px; border-radius: 999px; border: 0; cursor: pointer;
        background: color-mix(in srgb, #faf6f0 14%, transparent); color: #faf6f0;
        backdrop-filter: blur(4px); transition: background .2s var(--ease), transform .2s var(--ease);
      }
      .lb-btn:hover { background: color-mix(in srgb, #faf6f0 26%, transparent); }
      .lb-btn:active { transform: scale(.94); }
      .lb-btn svg { width: 24px; height: 24px; }
      .lb-close { top: clamp(14px, 3vw, 26px); right: clamp(14px, 3vw, 26px); }
      .lb-prev { left: clamp(10px, 2vw, 24px); top: 50%; transform: translateY(-50%); }
      .lb-next { right: clamp(10px, 2vw, 24px); top: 50%; transform: translateY(-50%); }
      .lb-prev:hover, .lb-next:hover { transform: translateY(-50%); }
      .lb-counter {
        position: absolute; bottom: clamp(14px, 3vw, 26px); left: 50%; transform: translateX(-50%);
        color: #faf6f0; font-size: .85rem; letter-spacing: .05em;
        background: color-mix(in srgb, #100c0a 45%, transparent); padding: 6px 14px; border-radius: 999px;
      }
      @media (max-width: 620px) {
        .lb-btn { width: 44px; height: 44px; }
        .lb-prev { left: 8px; } .lb-next { right: 8px; }
      }

      /* ---------- Footer ---------- */
      .album-foot { border-top: 1px solid var(--border); background: var(--cream); }
      .album-foot .container { display: flex; flex-wrap: wrap; gap: 16px 26px; align-items: center; justify-content: space-between; padding-block: 26px; }
      .album-foot p { margin: 0; color: var(--ink-soft); font-size: .9rem; }
      .foot-cta { display: inline-flex; gap: 10px; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        padding: 11px 20px; border-radius: 999px; font-size: .92rem; font-weight: 500;
        transition: transform .2s var(--ease), background .2s var(--ease), color .2s var(--ease);
      }
      .btn-primary { background: var(--clay); color: #fff; }
      .btn-primary:hover { transform: translateY(-2px); background: var(--rose-deep); }
      .btn-ghost { border: 1px solid var(--border); color: var(--ink); }
      .btn-ghost:hover { background: color-mix(in srgb, var(--ink) 6%, transparent); }
    </style>
  </head>

    <script>
      /* ---------- Theme toggle ---------- */
      (function () {
        var root = document.documentElement;
        var btn = document.querySelector('.theme-toggle');
        function current() {
          var set = root.getAttribute('data-theme');
          if (set) return set;
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        btn.addEventListener('click', function () {
          var next = current() === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', next);
          try { localStorage.setItem('beo-theme', next); } catch (e) {}
        });
      })();

      /* ============================================================
         TỰ ĐỘNG NẠP ẢNH
         --------------------------------------------------------
         Cách thêm ảnh: chỉ cần chép ảnh vào thư mục  photos/
         và đặt tên theo số thứ tự:  1.jpg  2.jpg  3.jpg ...
         (hỗ trợ .jpg .jpeg .png .webp). Ảnh sẽ tự hiện lên đây,
         KHÔNG cần sửa file này.
         ============================================================ */
      (function () {
        var DIR = 'photos/';
        var EXTS = ['jpg', 'jpeg', 'png', 'webp', 'JPG', 'JPEG', 'PNG', 'WEBP'];
        var MAX = 500;      // số ảnh tối đa dò tìm
        var MAX_GAP = 8;    // dừng sau ngần này số bị thiếu liên tiếp

        var stateEl = document.getElementById('state');
        var grid = document.getElementById('masonry');
        var photos = [];

        function tryLoad(src) {
          return new Promise(function (res) {
            var im = new Image();
            im.onload = function () { res(true); };
            im.onerror = function () { res(false); };
            im.src = src;
          });
        }

        async function findAt(i) {
          for (var k = 0; k < EXTS.length; k++) {
            var src = DIR + i + '.' + EXTS[k];
            if (await tryLoad(src)) return src;
          }
          return null;
        }

        async function collect() {
          // 1) Nếu có file danh sách photos/list.json thì dùng nó (tùy chọn nâng cao)
          try {
            var r = await fetch(DIR + 'list.json', { cache: 'no-store' });
            if (r.ok) {
              var arr = await r.json();
              if (Array.isArray(arr) && arr.length) {
                return arr.map(function (n) { return DIR + n; });
              }
            }
          } catch (e) {}

          // 2) Dò theo số thứ tự 1,2,3,...
          var found = [], gap = 0;
          for (var i = 1; i <= MAX; i++) {
            var s = await findAt(i);
            if (s) { found.push(s); gap = 0; }
            else {
              gap++;
              if (found.length === 0 && gap >= 4) break;   // không có ảnh nào -> dừng sớm
              if (gap >= MAX_GAP) break;
            }
          }
          return found;
        }

        function showEmpty() {
          stateEl.className = 'state empty';
          stateEl.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="8.5" cy="10" r="1.6" fill="currentColor"/><path d="M4 17l4.5-4.5 3 3 3.5-3.5L20 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
            '<h2>Album đang được cập nhật</h2>' +
            '<p>Ảnh sẽ sớm được đăng tại đây. Bạn quay lại sau nhé.</p>';
        }

        function render(list) {
          photos = list;
          if (!list.length) { showEmpty(); return; }
          var frag = document.createDocumentFragment();
          list.forEach(function (src, idx) {
            var fig = document.createElement('figure');
            fig.className = 'tile';
            fig.style.animationDelay = Math.min(idx * 45, 600) + 'ms';
            var img = document.createElement('img');
            img.src = src;
            img.loading = 'lazy';
            img.alt = 'Ảnh bé ' + (idx + 1) + ' — BEO STUDIO';
            fig.appendChild(img);
            fig.addEventListener('click', function () { openLb(idx); });
            frag.appendChild(fig);
          });
          grid.appendChild(frag);
          stateEl.hidden = true;
          grid.hidden = false;
        }

        /* ---------- Lightbox ---------- */
        var lb = document.getElementById('lightbox');
        var lbImg = document.getElementById('lbImg');
        var lbCounter = document.getElementById('lbCounter');
        var cur = 0;

        function show(i) {
          cur = (i + photos.length) % photos.length;
          lbImg.src = photos[cur];
          lbCounter.textContent = (cur + 1) + ' / ' + photos.length;
        }
        function openLb(i) {
          show(i);
          lb.classList.add('open');
          document.body.classList.add('lb-lock');
        }
        function closeLb() {
          lb.classList.remove('open');
          document.body.classList.remove('lb-lock');
          lbImg.src = '';
        }
        document.getElementById('lbClose').addEventListener('click', closeLb);
        document.getElementById('lbPrev').addEventListener('click', function () { show(cur - 1); });
        document.getElementById('lbNext').addEventListener('click', function () { show(cur + 1); });
        lb.addEventListener('click', function (e) { if (e.target === lb || e.target.classList.contains('lb-stage')) closeLb(); });
        document.addEventListener('keydown', function (e) {
          if (!lb.classList.contains('open')) return;
          if (e.key === 'Escape') closeLb();
          else if (e.key === 'ArrowLeft') show(cur - 1);
          else if (e.key === 'ArrowRight') show(cur + 1);
        });
        // Vuốt trên điện thoại
        var tx = 0;
        lb.addEventListener('touchstart', function (e) { tx = e.changedTouches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', function (e) {
          var dx = e.changedTouches[0].clientX - tx;
          if (Math.abs(dx) > 50) show(cur + (dx < 0 ? 1 : -1));
        }, { passive: true });

        /* ---------- Go ---------- */
        collect().then(render).catch(showEmpty);
      })();
    </script>
  </body>
</html>
